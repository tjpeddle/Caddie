<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Vector Green</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #0a0f0a;
    --surface: #141e14;
    --surface2: #1a2b1a;
    --green: #2ecc71;
    --green-dim: #1a7a42;
    --gold: #f0c040;
    --red: #e74c3c;
    --white: #f0f0e8;
    --gray: #6b7b6b;
    --radius: 16px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100dvh;
    overflow: hidden;
    touch-action: manipulation;
}
button {
    font-family: 'DM Sans', sans-serif;
    border: none;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
}
button:active { transform: scale(0.95); }

/* ==================== SCREENS ==================== */
.screen { display: none; flex-direction: column; height: 100dvh; padding: 16px; padding-bottom: calc(16px + var(--safe-bottom)); }
.screen.active { display: flex; }

/* ==================== SETUP SCREEN ==================== */
#setupScreen { justify-content: center; gap: 20px; align-items: center; }
.app-title { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; color: var(--green); text-align: center; letter-spacing: 2px; }
.app-subtitle { color: var(--gray); font-size: 13px; text-align: center; margin-top: -12px; letter-spacing: 1px; }
.setup-section { width: 100%; max-width: 380px; }
.setup-label { font-size: 12px; color: var(--gray); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; text-align: center; font-weight: 700; }
.speed-btns, .mode-btns { display: flex; gap: 8px; width: 100%; }
.speed-btn, .mode-btn {
    flex: 1; padding: 16px 8px; border-radius: var(--radius); background: var(--surface);
    color: var(--gray); font-size: 15px; font-weight: 700; text-align: center;
    border: 2px solid transparent; transition: all 0.15s;
}
.speed-btn.active { background: var(--green-dim); color: var(--white); border-color: var(--green); }
.mode-btn { padding: 20px 8px; font-size: 16px; }
.mode-btn.round-btn { border-color: var(--green-dim); }
.mode-btn.putting-btn { border-color: var(--green-dim); }
.mode-btn:active { transform: scale(0.97); }
.start-btn {
    width: 100%; max-width: 380px; padding: 18px; border-radius: var(--radius);
    background: var(--green); color: var(--bg); font-size: 18px; font-weight: 700;
    letter-spacing: 1px; margin-top: 8px;
}
.start-btn:disabled { opacity: 0.3; }

/* ==================== COURSE PICKER ==================== */
.course-list { display: flex; flex-direction: column; gap: 6px; max-height: 180px; overflow-y: auto; width: 100%; max-width: 380px; }
.course-item {
    padding: 14px 16px; border-radius: 12px; background: var(--surface);
    color: var(--white); font-size: 15px; font-weight: 500; border: 2px solid transparent;
}
.course-item.active { border-color: var(--green); background: var(--green-dim); }
.add-course-btn { color: var(--green); background: transparent; font-size: 14px; padding: 10px; text-align: center; }

/* ==================== ROUND SCREEN ==================== */
#roundScreen { padding: 0; gap: 0; }
.round-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--surface2);
}
.hole-badge { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: var(--green); }
.round-score { font-family: 'JetBrains Mono', monospace; font-size: 16px; color: var(--gray); }
.round-body { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 16px; gap: 16px; }

/* Stat buttons — big tap targets */
.stat-row { display: flex; gap: 10px; width: 100%; max-width: 400px; }
.stat-question { font-size: 14px; color: var(--gray); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; text-align: center; width: 100%; }
.stat-btn {
    flex: 1; padding: 22px 12px; border-radius: var(--radius); font-size: 15px; font-weight: 700;
    text-align: center; min-height: 64px; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 4px;
}
.stat-btn.yes { background: rgba(46,204,113,0.15); color: var(--green); border: 2px solid var(--green-dim); }
.stat-btn.no { background: rgba(231,76,60,0.1); color: var(--red); border: 2px solid rgba(231,76,60,0.3); }
.stat-btn.neutral { background: var(--surface); color: var(--white); border: 2px solid var(--surface2); }
.stat-btn.miss-left { background: rgba(231,76,60,0.1); color: #e8a040; border: 2px solid rgba(232,160,64,0.3); }
.stat-btn.miss-right { background: rgba(231,76,60,0.1); color: #e8a040; border: 2px solid rgba(232,160,64,0.3); }
.stat-btn .icon { font-size: 24px; }
.stat-btn .label { font-size: 12px; }

/* ==================== PUTTING SCREEN ==================== */
#puttScreen { padding: 0; gap: 0; }
.putt-header { padding: 10px 16px; background: var(--surface); text-align: center; border-bottom: 1px solid var(--surface2); }
.putt-header-title { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--gray); }
.putt-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px; gap: 12px; }

/* Clock face */
.clock-container { position: relative; width: 260px; height: 260px; }
.clock-ring { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--surface2); position: relative; background: var(--surface); }
.clock-num {
    position: absolute; width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700;
    color: var(--gray); background: var(--bg); border: 2px solid var(--surface2);
    transition: all 0.15s; z-index: 2;
}
.clock-num.active { background: var(--green-dim); color: var(--white); border-color: var(--green); }
.clock-center {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 50px; height: 50px; border-radius: 50%; background: var(--bg);
    border: 2px solid var(--surface2); display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--gray);
}
.slope-arrow {
    position: absolute; right: -30px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    color: var(--gray); font-size: 11px; font-family: 'JetBrains Mono', monospace;
}

/* Distance selector */
.distance-section { width: 100%; max-width: 360px; text-align: center; }
.distance-display {
    font-family: 'JetBrains Mono', monospace; font-size: 48px; font-weight: 700;
    color: var(--white); text-align: center; margin-bottom: 4px;
}
.distance-display span { font-size: 20px; color: var(--gray); }
.distance-slider { width: 100%; height: 44px; -webkit-appearance: none; appearance: none; background: var(--surface); border-radius: 22px; outline: none; }
.distance-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 44px; height: 44px; border-radius: 50%;
    background: var(--green); cursor: pointer; border: 3px solid var(--white);
}
.distance-presets { display: flex; gap: 6px; margin-top: 8px; justify-content: center; flex-wrap: wrap; }
.dist-preset {
    padding: 8px 14px; border-radius: 20px; background: var(--surface); color: var(--gray);
    font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700;
    border: 2px solid transparent;
}
.dist-preset.active { background: var(--green-dim); color: var(--white); border-color: var(--green); }

/* Slope selector */
.slope-section { display: flex; gap: 6px; justify-content: center; }
.slope-btn {
    width: 52px; height: 44px; border-radius: 12px; background: var(--surface);
    color: var(--gray); font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700;
    border: 2px solid transparent;
}
.slope-btn.active { background: var(--green-dim); color: var(--white); border-color: var(--green); }

/* Read button */
.read-btn {
    width: 100%; max-width: 360px; padding: 16px; border-radius: var(--radius);
    background: var(--gold); color: var(--bg); font-size: 18px; font-weight: 700;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 1px;
}
.read-btn:disabled { opacity: 0.3; }

/* ==================== RESULT SCREEN ==================== */
#resultScreen { padding: 0; gap: 0; justify-content: center; align-items: center; background: var(--surface); }
.result-viz { width: 100%; flex: 1; display: flex; align-items: center; justify-content: center; padding: 8px; }
.result-viz svg { width: 100%; height: 100%; }
.result-big-number {
    text-align: center; padding: 16px; background: var(--bg);
    width: 100%; border-top: 2px solid var(--green-dim);
}
.result-aim-label { font-size: 14px; color: var(--gray); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
.result-aim-value {
    font-family: 'JetBrains Mono', monospace; font-size: 56px; font-weight: 700; color: var(--gold);
    line-height: 1.1;
}
.result-aim-dir { font-size: 18px; color: var(--green); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.result-detail { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--gray); margin-top: 4px; }
.result-actions { display: flex; gap: 10px; width: 100%; padding: 12px 16px; padding-bottom: calc(12px + var(--safe-bottom)); background: var(--bg); }
.result-btn {
    flex: 1; padding: 18px; border-radius: var(--radius); font-size: 16px; font-weight: 700; text-align: center;
}
.result-btn.made { background: rgba(46,204,113,0.2); color: var(--green); border: 2px solid var(--green); }
.result-btn.missed { background: rgba(231,76,60,0.15); color: var(--red); border: 2px solid rgba(231,76,60,0.4); }
.result-btn.back { background: var(--surface); color: var(--gray); border: 2px solid var(--surface2); }

/* ==================== STATS OVERLAY ==================== */
.overlay { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100; flex-direction: column; overflow-y: auto; }
.overlay.active { display: flex; }
.overlay-header {
    display: flex; justify-content: space-between; align-items: center; padding: 16px;
    border-bottom: 1px solid var(--surface2); position: sticky; top: 0; background: var(--bg); z-index: 2;
}
.overlay-title { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; color: var(--green); }
.overlay-close { width: 40px; height: 40px; border-radius: 50%; background: var(--surface); color: var(--white); font-size: 20px; display: flex; align-items: center; justify-content: center; }
.overlay-body { padding: 16px; flex: 1; }

/* Stats cards */
.stat-card {
    background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
}
.stat-card-title { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 8px; }
.stat-card-value { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700; color: var(--white); }
.stat-card-sub { font-size: 13px; color: var(--gray); margin-top: 2px; }
.stat-row-inline { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--surface2); }
.stat-row-inline:last-child { border-bottom: none; }
.stat-row-label { color: var(--gray); font-size: 14px; }
.stat-row-value { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--white); font-size: 14px; }

/* Tab bar */
.tab-bar { display: flex; gap: 0; border-bottom: 2px solid var(--surface2); margin-bottom: 16px; }
.tab-btn {
    flex: 1; padding: 12px 8px; text-align: center; font-size: 13px; font-weight: 700;
    color: var(--gray); background: transparent; border-bottom: 2px solid transparent;
    margin-bottom: -2px; text-transform: uppercase; letter-spacing: 1px;
}
.tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Round history cards */
.history-card {
    background: var(--surface); border-radius: var(--radius); padding: 14px; margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
}
.history-card-left { }
.history-course { font-weight: 700; font-size: 15px; }
.history-date { font-size: 12px; color: var(--gray); margin-top: 2px; }
.history-card-right { text-align: right; }
.history-score { font-family: 'JetBrains Mono', monospace; font-size: 24px; font-weight: 700; color: var(--green); }
.history-stats { font-size: 11px; color: var(--gray); }

/* Bottom nav */
.bottom-nav {
    display: flex; gap: 0; background: var(--surface); border-top: 1px solid var(--surface2);
    padding: 8px 4px; padding-bottom: calc(8px + var(--safe-bottom));
}
.nav-btn {
    flex: 1; padding: 10px 4px; border-radius: 12px; background: transparent;
    color: var(--gray); font-size: 11px; font-weight: 700; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
}
.nav-btn .nav-icon { font-size: 20px; }
.nav-btn.active { color: var(--green); }

/* Next hole button */
.next-hole-btn {
    width: 100%; max-width: 400px; padding: 16px; border-radius: var(--radius);
    background: var(--green); color: var(--bg); font-size: 16px; font-weight: 700;
    letter-spacing: 1px;
}

/* Scorecard */
.scorecard { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; margin-bottom: 8px; }
.sc-cell {
    text-align: center; padding: 6px 2px; border-radius: 6px; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 700;
}
.sc-header { background: var(--surface2); color: var(--gray); }
.sc-par { background: var(--surface); color: var(--gray); }
.sc-score { background: var(--surface); color: var(--white); }
.sc-score.birdie { color: var(--green); background: rgba(46,204,113,0.15); }
.sc-score.bogey { color: var(--red); background: rgba(231,76,60,0.1); }
.sc-score.eagle { color: var(--gold); background: rgba(240,192,64,0.15); }
.sc-score.current { border: 2px solid var(--green); }

/* Empty state */
.empty-state { text-align: center; padding: 40px 20px; color: var(--gray); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>

<!-- ==================== SETUP SCREEN ==================== -->
<div id="setupScreen" class="screen active">
    <div class="app-title">⛳ VECTOR GREEN</div>
    <div class="app-subtitle">TAP · READ · PUTT</div>
    
    <div class="setup-section">
        <div class="setup-label">Green Speed</div>
        <div class="speed-btns">
            <button class="speed-btn" data-speed="slow" onclick="setSpeed('slow')">SLOW</button>
            <button class="speed-btn" data-speed="medium" onclick="setSpeed('medium')">MED</button>
            <button class="speed-btn" data-speed="fast" onclick="setSpeed('fast')">FAST</button>
            <button class="speed-btn" data-speed="veryfast" onclick="setSpeed('veryfast')">V.FAST</button>
        </div>
    </div>
    
    <div class="setup-section">
        <div class="setup-label">Course</div>
        <div class="course-list" id="courseList"></div>
        <button class="add-course-btn" onclick="addCourse()">+ Add Course</button>
    </div>
    
    <div class="setup-section">
        <div class="setup-label">Mode</div>
        <div class="mode-btns">
            <button class="mode-btn round-btn" onclick="startRound()">🏌️ Round</button>
            <button class="mode-btn putting-btn" onclick="startPutting()">🎯 Putting</button>
        </div>
    </div>
</div>

<!-- ==================== ROUND SCREEN ==================== -->
<div id="roundScreen" class="screen">
    <div class="round-header">
        <div class="hole-badge" id="holeBadge">HOLE 1</div>
        <div class="round-score" id="roundScoreDisplay">E</div>
    </div>
    <div class="round-body" id="roundBody"></div>
    <div class="bottom-nav">
        <button class="nav-btn" onclick="showScorecard()"><span class="nav-icon">📋</span>Card</button>
        <button class="nav-btn" onclick="showStats()"><span class="nav-icon">📊</span>Stats</button>
        <button class="nav-btn" onclick="showHistory()"><span class="nav-icon">📜</span>History</button>
        <button class="nav-btn" onclick="endRound()"><span class="nav-icon">🏁</span>End</button>
    </div>
</div>

<!-- ==================== PUTTING SCREEN ==================== -->
<div id="puttScreen" class="screen">
    <div class="putt-header">
        <div class="putt-header-title" id="puttHeaderTitle">SELECT CLOCK · DISTANCE · SLOPE</div>
    </div>
    <div class="putt-body">
        <!-- Clock face -->
        <div class="clock-container" id="clockContainer">
            <div class="clock-ring" id="clockRing"></div>
            <div class="clock-center">HOLE</div>
        </div>
        
        <!-- Distance -->
        <div class="distance-section">
            <div class="distance-display"><span id="distValue">10</span><span>ft</span></div>
            <input type="range" class="distance-slider" id="distSlider" min="2" max="60" value="10" oninput="updateDist()">
            <div class="distance-presets" id="distPresets"></div>
        </div>
        
        <!-- Slope -->
        <div class="slope-section" id="slopeSection"></div>
        
        <!-- Read button -->
        <button class="read-btn" id="readBtn" onclick="calculateRead()">READ PUTT</button>
    </div>
</div>

<!-- ==================== RESULT SCREEN ==================== -->
<div id="resultScreen" class="screen">
    <div class="result-viz" id="resultViz">
        <svg id="resultSVG" viewBox="0 0 300 400"></svg>
    </div>
    <div class="result-big-number" id="resultBigNumber">
        <div class="result-aim-label">AIM</div>
        <div class="result-aim-value" id="resultAimValue">7"</div>
        <div class="result-aim-dir" id="resultAimDir">LEFT OF CENTER</div>
        <div class="result-detail" id="resultDetail">10ft · 3 o'clock · 2%</div>
    </div>
    <div class="result-actions">
        <button class="result-btn made" onclick="recordResult('made')">✓ MADE</button>
        <button class="result-btn missed" onclick="recordResult('missed')">✗ MISS</button>
        <button class="result-btn back" onclick="dismissResult()">←</button>
    </div>
</div>

<!-- ==================== STATS OVERLAY ==================== -->
<div id="statsOverlay" class="overlay">
    <div class="overlay-header">
        <div class="overlay-title">STATS</div>
        <button class="overlay-close" onclick="closeOverlay('statsOverlay')">✕</button>
    </div>
    <div class="overlay-body" id="statsBody"></div>
</div>

<!-- ==================== SCORECARD OVERLAY ==================== -->
<div id="scorecardOverlay" class="overlay">
    <div class="overlay-header">
        <div class="overlay-title">SCORECARD</div>
        <button class="overlay-close" onclick="closeOverlay('scorecardOverlay')">✕</button>
    </div>
    <div class="overlay-body" id="scorecardBody"></div>
</div>

<!-- ==================== HISTORY OVERLAY ==================== -->
<div id="historyOverlay" class="overlay">
    <div class="overlay-header">
        <div class="overlay-title">HISTORY</div>
        <button class="overlay-close" onclick="closeOverlay('historyOverlay')">✕</button>
    </div>
    <div class="overlay-body" id="historyBody"></div>
</div>

<script>
// ==========================================
// STATE
// ==========================================
const STATE = {
    greenSpeed: null,       // slow, medium, fast, veryfast
    stimp: 9,
    course: null,
    mode: null,             // 'round' or 'practice'
    slope: 2,
    clockPos: null,
    distance: 10,
    
    // Round tracking
    currentHole: 1,
    holes: [],              // { number, par, fairway, green, missLocation, upDown, bunkerUpDown, putts, puttDistances[] }
    currentHoleData: null,
    roundStep: 'fairway',   // fairway, approach, miss_location, up_down, putt, result, next
    
    // Practice tracking
    practiceSession: { putts: [], totalMade: 0, totalMissed: 0, startTime: null },
};

// ==========================================
// STORAGE
// ==========================================
function loadData() {
    try {
        const d = JSON.parse(localStorage.getItem('vectorgreen') || '{}');
        return {
            courses: d.courses || ['Oak Hollow', 'Blair Park', 'Jamestown', 'Sedgefield', 'Bryan Park'],
            rounds: d.rounds || [],
            practiceSessions: d.practiceSessions || [],
            lastSpeed: d.lastSpeed || null,
            lastCourse: d.lastCourse || null,
        };
    } catch(e) { return { courses: ['Oak Hollow'], rounds: [], practiceSessions: [], lastSpeed: null, lastCourse: null }; }
}
function saveData() { localStorage.setItem('vectorgreen', JSON.stringify(DB)); }
let DB = loadData();

// ==========================================
// VECTOR PUTTING ENGINE
// ==========================================
const GRAVITY_TABLES = {
    slow: {
        1: { 5:1, 10:3, 15:5, 20:8, 25:11, 30:15 },
        2: { 5:2, 10:6, 15:10, 20:15, 25:21, 30:29 },
        3: { 5:3, 10:9, 15:16, 20:24, 25:33, 30:44 },
        4: { 5:4, 10:12, 15:21, 20:32, 25:44, 30:58 },
        5: { 5:5, 10:15, 15:27, 20:40, 25:55, 30:73 },
    },
    medium: {
        1: { 5:1, 10:4, 15:7, 20:10, 25:14, 30:19 },
        2: { 5:3, 10:7, 15:13, 20:20, 25:28, 30:37 },
        3: { 5:4, 10:10, 15:19, 20:29, 25:41, 30:55 },
        4: { 5:5, 10:14, 15:26, 20:39, 25:55, 30:73 },
        5: { 5:6, 10:18, 15:32, 20:49, 25:69, 30:92 },
    },
    fast: {
        1: { 5:2, 10:5, 15:9, 20:13, 25:18, 30:24 },
        2: { 5:3, 10:9, 15:17, 20:26, 25:36, 30:48 },
        3: { 5:5, 10:14, 15:25, 20:38, 25:53, 30:71 },
        4: { 5:7, 10:18, 15:33, 20:51, 25:71, 30:95 },
        5: { 5:8, 10:23, 15:42, 20:64, 25:89, 30:119 },
    },
    veryfast: {
        1: { 5:2, 10:6, 15:11, 20:16, 25:23, 30:30 },
        2: { 5:4, 10:11, 15:21, 20:32, 25:45, 30:60 },
        3: { 5:6, 10:17, 15:31, 20:48, 25:67, 30:89 },
        4: { 5:8, 10:23, 15:42, 20:64, 25:89, 30:119 },
        5: { 5:10, 10:29, 15:53, 20:80, 25:111, 30:149 },
    }
};

function getSpeedCategory(stimp) {
    if (stimp < 8.75) return 'slow';
    if (stimp < 10.25) return 'medium';
    if (stimp < 11.75) return 'fast';
    return 'veryfast';
}

function getGravityVector(distance, slope, stimp) {
    const cat = getSpeedCategory(stimp);
    const slopeTable = GRAVITY_TABLES[cat][Math.min(5, Math.max(1, Math.round(slope)))];
    if (!slopeTable) return 0;
    
    if (distance < 5) {
        return Math.round(slopeTable[5] * (distance / 5));
    }
    
    const lower = Math.max(5, Math.min(30, Math.floor(distance / 5) * 5));
    const upper = Math.max(5, Math.min(30, Math.ceil(distance / 5) * 5));
    if (lower === upper) return slopeTable[lower] || 0;
    
    const lv = slopeTable[lower] || 0;
    const uv = slopeTable[upper] || 0;
    return Math.round(lv + (uv - lv) * ((distance - lower) / (upper - lower)));
}

function getAimPoint(distance, slope, stimp, clockPos) {
    const gv = getGravityVector(distance, slope, stimp);
    
    // Clock angle: 12=0°, 3=90°, 6=180°, 9=270°
    const clockAngles = { 12:0, 1:30, 2:60, 3:90, 4:120, 5:150, 6:180, 7:210, 8:240, 9:270, 10:300, 11:330 };
    const angle = clockAngles[clockPos] || 0;
    const angleMultiplier = Math.abs(Math.sin(angle * Math.PI / 180));
    
    let adjusted = Math.round(gv * angleMultiplier);
    
    // Uphill/downhill
    if (clockPos >= 10 || clockPos <= 2) adjusted = Math.round(adjusted * 1.15); // downhill
    else if (clockPos >= 4 && clockPos <= 8) adjusted = Math.round(adjusted * 0.85); // uphill
    
    // Break direction
    let direction = '';
    if (clockPos >= 1 && clockPos <= 5) direction = 'right';  // aim right
    else if (clockPos >= 7 && clockPos <= 11) direction = 'left'; // aim left
    
    // Elevation
    let elevation = 'level';
    if (clockPos >= 10 || clockPos <= 2) elevation = 'downhill';
    else if (clockPos >= 4 && clockPos <= 8) elevation = 'uphill';
    
    // Description
    let desc = '';
    if (adjusted < 2) desc = 'Center of the cup';
    else if (adjusted <= 4) desc = `Aim ${adjusted}" up the fall line`;
    else if (adjusted <= 12) desc = `Aim ${adjusted}" up the fall line`;
    else {
        const ft = Math.floor(adjusted / 12);
        const inches = adjusted % 12;
        desc = inches === 0 ? `Aim ${ft}ft up the fall line` : `Aim ${ft}'${inches}" up the fall line`;
    }
    
    return { inches: adjusted, direction, elevation, description: desc, clockPos, angleMultiplier };
}

function initSetup() {

    const stimpMap = { slow: 8, medium: 9.5, fast: 11, veryfast: 12.5 };
    STATE.stimp = stimpMap[speed];
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', b.dataset.speed === speed));

}

function renderCourses() {

}

// ==========================================
// START ROUND
// ==========================================
function startRound() {
    if (!STATE.greenSpeed) { alert('Set green speed first'); return; }
    STATE.mode = 'round';
    STATE.currentHole = 1;
    STATE.holes = [];
    STATE.currentHoleData = newHoleData(1);
    STATE.roundStep = 'fairway';
    showScreen('roundScreen');
    renderRoundStep();
}

function newHoleData(num) {
    return { number: num, par: 4, fairway: null, fairwayMiss: null, green: null, missLocation: null, upDown: null, putts: 0, puttDistances: [], score: null };
}

// ==========================================
// ROUND FLOW
// ==========================================
function renderRoundStep() {
    const body = document.getElementById('roundBody');
    const h = STATE.currentHoleData;
    document.getElementById('holeBadge').textContent = `HOLE ${h.number}`;
    updateScoreDisplay();
    
    switch (STATE.roundStep) {
        case 'fairway':
            body.innerHTML = `
                <div class="stat-question">Fairway?</div>
                <div class="stat-row">
                    <button class="stat-btn yes" onclick="recordFairway('hit')"><span class="icon">✓</span><span class="label">HIT</span></button>
                    <button class="stat-btn miss-left" onclick="recordFairway('left')"><span class="icon">←</span><span class="label">MISS L</span></button>
                    <button class="stat-btn miss-right" onclick="recordFairway('right')"><span class="icon">→</span><span class="label">MISS R</span></button>
                </div>
                <div class="stat-row" style="margin-top: 8px">
                    <button class="stat-btn neutral" onclick="recordFairway('skip')" style="flex:1"><span class="label">PAR 3 / SKIP</span></button>
                </div>`;
            break;
            
        case 'approach':
            body.innerHTML = `
                <div class="stat-question">Green in Regulation?</div>
                <div class="stat-row">
                    <button class="stat-btn yes" onclick="recordGreen('hit')"><span class="icon">✓</span><span class="label">ON GREEN</span></button>
                    <button class="stat-btn no" onclick="recordGreen('missed')"><span class="icon">✗</span><span class="label">MISSED</span></button>
                </div>`;
            break;
            
        case 'miss_location':
            body.innerHTML = `
                <div class="stat-question">Where?</div>
                <div class="stat-row">
                    <button class="stat-btn neutral" onclick="recordMissLocation('fringe')"><span class="icon">🟢</span><span class="label">FRINGE</span></button>
                    <button class="stat-btn neutral" onclick="recordMissLocation('bunker')"><span class="icon">⛱️</span><span class="label">BUNKER</span></button>
                    <button class="stat-btn neutral" onclick="recordMissLocation('rough')"><span class="icon">🌿</span><span class="label">ROUGH</span></button>
                </div>`;
            break;
            
        case 'up_down':
            body.innerHTML = `
                <div class="stat-question">Up & Down?</div>
                <div class="stat-row">
                    <button class="stat-btn yes" onclick="recordUpDown(true)"><span class="icon">✓</span><span class="label">YES</span></button>
                    <button class="stat-btn no" onclick="recordUpDown(false)"><span class="icon">✗</span><span class="label">NO</span></button>
                </div>`;
            break;
            
        case 'putt':
            showScreen('puttScreen');
            document.getElementById('puttHeaderTitle').textContent = `HOLE ${h.number} · PUTT ${h.putts + 1}`;
            return;
            
        case 'next':
            const totalPutts = h.putts;
            body.innerHTML = `
                <div class="stat-question">HOLE ${h.number} COMPLETE</div>
                <div style="text-align:center; margin: 8px 0;">
                    <div style="font-family:'JetBrains Mono',monospace; font-size:48px; font-weight:700; color:var(--white)">${totalPutts}</div>
                    <div style="font-size:14px; color:var(--gray)">PUTTS</div>
                </div>
                <div class="stat-row">
                    <button class="stat-btn neutral" onclick="adjustPutts(-1)"><span class="icon">−</span></button>
                    <button class="stat-btn neutral" onclick="adjustPutts(1)"><span class="icon">+</span></button>
                </div>
                <button class="next-hole-btn" onclick="nextHole()" style="margin-top:16px">NEXT HOLE →</button>`;
            break;
    }
}

function recordFairway(result) {
    STATE.currentHoleData.fairway = result === 'hit';
    STATE.currentHoleData.fairwayMiss = result === 'left' ? 'left' : result === 'right' ? 'right' : null;
    STATE.roundStep = 'approach';
    renderRoundStep();
}

function recordGreen(result) {
    STATE.currentHoleData.green = result === 'hit';
    if (result === 'hit') {
        STATE.roundStep = 'putt';
    } else {
        STATE.roundStep = 'miss_location';
    }
    renderRoundStep();
}

function recordMissLocation(loc) {
    STATE.currentHoleData.missLocation = loc;
    STATE.roundStep = 'up_down';
    renderRoundStep();
}

function recordUpDown(made) {
    STATE.currentHoleData.upDown = made;
    STATE.roundStep = 'putt';
    renderRoundStep();
}

function adjustPutts(delta) {
    STATE.currentHoleData.putts = Math.max(0, STATE.currentHoleData.putts + delta);
    renderRoundStep();
}

function nextHole() {
    // Save current hole
    STATE.holes.push({...STATE.currentHoleData});
    STATE.currentHole++;
    
    if (STATE.currentHole > 18) {
        finishRound();
        return;
    }
    
    STATE.currentHoleData = newHoleData(STATE.currentHole);
    STATE.roundStep = 'fairway';
    showScreen('roundScreen');
    renderRoundStep();
}

function updateScoreDisplay() {
    const totalPutts = STATE.holes.reduce((s, h) => s + h.putts, 0);
    document.getElementById('roundScoreDisplay').textContent = `${totalPutts} putts · ${STATE.holes.length} holes`;
}

// ==========================================
// CALCULATE & SHOW RESULT
// ==========================================
function calculateRead() {
    if (!STATE.clockPos) return;
    
    const aim = getAimPoint(STATE.distance, STATE.slope, STATE.stimp, STATE.clockPos);
    showResult(STATE.distance, STATE.clockPos, STATE.slope, aim);
}

function showResult(feet, clockPos, slope, aim) {
    // Big number
    if (aim.inches < 2) {
        document.getElementById('resultAimValue').textContent = '0"';
        document.getElementById('resultAimDir').textContent = 'STRAIGHT · CENTER CUP';
    } else {
        document.getElementById('resultAimValue').textContent = aim.inches <= 12 ? `${aim.inches}"` : `${Math.floor(aim.inches/12)}'${aim.inches%12}"`;
        document.getElementById('resultAimDir').textContent = 'ABOVE HOLE ON FALL LINE';
    }
    document.getElementById('resultDetail').textContent = `${feet}ft · ${clockPos} o'clock · ${slope}% · ${STATE.greenSpeed}`;
    
    // Build SVG visualization
    buildPuttViz(feet, clockPos, slope, aim);
    
    showScreen('resultScreen');
    
    // Store for tracking
    STATE._lastRead = { feet, clockPos, slope, aim };
}

function buildPuttViz(feet, clockPos, slope, aim) {
    const svg = document.getElementById('resultSVG');
    const holeX = 0, holeY = 0, holeR = 30, ballR = 12;
    
    const pixelDist = 130 * Math.sqrt(feet) + 35;
    const svgClockAngles = { 12:-90, 1:-60, 2:-30, 3:0, 4:30, 5:60, 6:90, 7:120, 8:150, 9:180, 10:210, 11:240 };
    const angleDeg = svgClockAngles[clockPos] ?? 90;
    const angleRad = angleDeg * Math.PI / 180;
    
    const ballX = holeX + Math.cos(angleRad) * pixelDist;
    const ballY = holeY + Math.sin(angleRad) * pixelDist;
    
    const aimInches = aim.inches;
    const aimDir = aim.direction;
    // Aim offset scaled to the CUP (our reference object)
    // Cup = 4.25" diameter = 60px diameter, so 1 inch = 14px
    // 9" aim = ~126px = about 2 cup widths above hole — visually correct
    const aimOffsetPx = aimInches * 14;
    
    // ZBL direction = straight up (toward 12 o'clock) = (0, -1) in SVG
    let aimX = holeX;
    let aimY = holeY - aimOffsetPx; // always ABOVE the hole on the fall line
    
    // ViewBox
    const allX = [holeX, ballX, aimX], allY = [holeY, ballY, aimY];
    const pad = 55;
    let vbMinX = Math.min(...allX) - pad, vbMaxX = Math.max(...allX) + pad;
    let vbMinY = Math.min(...allY) - pad, vbMaxY = Math.max(...allY) + pad;
    let vw = vbMaxX - vbMinX, vh = vbMaxY - vbMinY;
    const ratio = 0.72;
    if (vw/vh < ratio) { const n = vh*ratio; vbMinX -= (n-vw)/2; vw = n; }
    else if (vh/vw < ratio) { const n = vw/ratio; vbMinY -= (n-vh)/2; vh = n; }
    
    svg.setAttribute('viewBox', `${vbMinX} ${vbMinY} ${vw} ${vh}`);
    
    let s = `<defs>
        <radialGradient id="gG" cx="50%" cy="48%" r="55%"><stop offset="0%" stop-color="#2a6d3c"/><stop offset="100%" stop-color="#164a26"/></radialGradient>
        <radialGradient id="hG" cx="35%" cy="30%" r="55%"><stop offset="0%" stop-color="#222"/><stop offset="100%" stop-color="#000"/></radialGradient>
        <filter id="gl"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>`;
    
    // Green bg + stripes
    s += `<rect x="${vbMinX}" y="${vbMinY}" width="${vw}" height="${vh}" fill="url(#gG)"/>`;
    for (let sy = vbMinY; sy < vbMinY+vh; sy += 70) s += `<rect x="${vbMinX}" y="${sy}" width="${vw}" height="35" fill="rgba(255,255,255,0.035)"/>`;
    
    // Slope arrow
    if (slope > 0) {
        const arX = vbMinX + vw - 30;
        s += `<line x1="${arX}" y1="${holeY-50}" x2="${arX}" y2="${holeY+50}" stroke="rgba(255,255,255,0.3)" stroke-width="2.5"/>`;
        s += `<polygon points="${arX},${holeY+60} ${arX-7},${holeY+50} ${arX+7},${holeY+50}" fill="rgba(255,255,255,0.3)"/>`;
        s += `<text x="${arX}" y="${holeY-58}" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="12" font-weight="700" font-family="JetBrains Mono">${slope}%</text>`;
    }
    
    // Hole
    s += `<circle cx="${holeX}" cy="${holeY}" r="${holeR+2}" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="2.5"/>`;
    s += `<circle cx="${holeX}" cy="${holeY}" r="${holeR}" fill="url(#hG)"/>`;
    
    // Aim point + measurement
    if (aimInches >= 2) {
        // Aim point dot (on ZBL above hole)
        s += `<circle cx="${aimX}" cy="${aimY}" r="8" fill="#fbbf24" opacity="0.8" filter="url(#gl)"/>`;
        s += `<circle cx="${aimX}" cy="${aimY}" r="4" fill="#fff" opacity="0.9"/>`;
        // AIM label above the dot
        s += `<text x="${aimX}" y="${aimY-16}" text-anchor="middle" fill="#fbbf24" font-size="14" font-weight="700" font-family="JetBrains Mono">AIM</text>`;
        // ZBL line from hole up to aim point (the fall line)
        s += `<line x1="${holeX}" y1="${holeY}" x2="${aimX}" y2="${aimY}" stroke="#fbbf24" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>`;
        // Measurement label
        const mx = aimX + 20, my = (holeY + aimY) / 2;
        s += `<text x="${mx}" y="${my}" text-anchor="start" fill="#fbbf24" font-size="13" font-weight="700" font-family="JetBrains Mono" opacity="0.8">${aimInches}"</text>`;
    }
    
    // Start line
    if (aimInches >= 2) {
        const dx = aimX-ballX, dy = aimY-ballY, len = Math.sqrt(dx*dx+dy*dy)||1;
        s += `<line x1="${ballX}" y1="${ballY}" x2="${aimX+(dx/len)*60}" y2="${aimY+(dy/len)*60}" stroke="#fbbf24" stroke-width="3" opacity="0.75"/>`;
    }
    
    // True roll curve
    if (aimInches >= 2) {
        const sdx = aimX-ballX, sdy = aimY-ballY, slen = Math.sqrt(sdx*sdx+sdy*sdy)||1;
        const cpX = ballX + sdx*0.45 + (aimX-holeX)*0.3;
        const cpY = ballY + sdy*0.45 + (aimY-holeY)*0.3;
        s += `<path d="M${ballX},${ballY} Q${cpX},${cpY} ${holeX},${holeY}" fill="none" stroke="#4ade80" stroke-width="3.5" opacity="0.55" stroke-dasharray="10,6"/>`;
    } else {
        s += `<line x1="${ballX}" y1="${ballY}" x2="${holeX}" y2="${holeY}" stroke="#4ade80" stroke-width="3.5" opacity="0.5" stroke-dasharray="10,6"/>`;
    }
    
    // Ball
    s += `<circle cx="${ballX}" cy="${ballY}" r="${ballR}" fill="white" filter="url(#gl)"/>`;
    s += `<circle cx="${ballX-3}" cy="${ballY-3}" r="2" fill="rgba(200,200,200,0.5)"/>`;
    s += `<circle cx="${ballX+2}" cy="${ballY-1}" r="1.5" fill="rgba(200,200,200,0.3)"/>`;
    
    // Legend
    const ly = vbMinY+vh-16, lx = vbMinX+vw/2;
    s += `<line x1="${lx-90}" y1="${ly}" x2="${lx-70}" y2="${ly}" stroke="#fbbf24" stroke-width="2.5"/>`;
    s += `<text x="${lx-65}" y="${ly+4}" fill="rgba(255,255,255,0.3)" font-size="9" font-family="JetBrains Mono">Start</text>`;
    s += `<line x1="${lx-10}" y1="${ly}" x2="${lx+10}" y2="${ly}" stroke="#4ade80" stroke-width="2.5" stroke-dasharray="4,3"/>`;
    s += `<text x="${lx+15}" y="${ly+4}" fill="rgba(255,255,255,0.3)" font-size="9" font-family="JetBrains Mono">Roll</text>`;
    s += `<circle cx="${lx+55}" cy="${ly}" r="4" fill="#fbbf24" opacity="0.7"/>`;
    s += `<text x="${lx+64}" y="${ly+4}" fill="rgba(255,255,255,0.3)" font-size="9" font-family="JetBrains Mono">Aim</text>`;
    
    svg.innerHTML = s;
}

// ==========================================
// RESULT ACTIONS
// ==========================================
function recordResult(result) {
    const read = STATE._lastRead;
    if (!read) return;
    
    if (STATE.mode === 'round') {
        STATE.currentHoleData.putts++;
        STATE.currentHoleData.puttDistances.push(read.feet);
        
        if (result === 'made') {
            STATE.roundStep = 'next';
            showScreen('roundScreen');
            renderRoundStep();
        } else {
            // Another putt — go back to putting screen
            STATE.clockPos = null;
            document.querySelectorAll('.clock-num').forEach(b => b.classList.remove('active'));
            document.getElementById('puttHeaderTitle').textContent = `HOLE ${STATE.currentHoleData.number} · PUTT ${STATE.currentHoleData.putts + 1}`;
            showScreen('puttScreen');
        }
    } else {
        // Practice mode
        if (result === 'made') STATE.practiceSession.totalMade++;
        else STATE.practiceSession.totalMissed++;
        STATE.practiceSession.putts.push({ ...read, result });
        
        // Reset clock for next putt
        STATE.clockPos = null;
        document.querySelectorAll('.clock-num').forEach(b => b.classList.remove('active'));
        showScreen('puttScreen');
        document.getElementById('puttHeaderTitle').textContent = `PUTTING · ${STATE.practiceSession.totalMade}/${STATE.practiceSession.totalMade + STATE.practiceSession.totalMissed} made`;
    }
}

function dismissResult() {
    if (STATE.mode === 'round') {
        showScreen('puttScreen');
    } else {
        showScreen('puttScreen');
    }
}

// ==========================================
// PUTTING MODE
// ==========================================
function startPutting() {
    if (!STATE.greenSpeed) { alert('Set green speed first'); return; }
    STATE.mode = 'practice';
    STATE.practiceSession = { putts: [], totalMade: 0, totalMissed: 0, startTime: Date.now() };
    showScreen('puttScreen');
    document.getElementById('puttHeaderTitle').textContent = 'PUTTING · 0/0 made';
}

// ==========================================
// FINISH ROUND
// ==========================================
function finishRound() {
    // Save to history
    const round = {
        date: new Date().toISOString(),
        course: STATE.course,
        greenSpeed: STATE.greenSpeed,
        holes: STATE.holes,
        stats: computeRoundStats(STATE.holes)
    };
    DB.rounds.push(round);
    saveData();
    showScreen('setupScreen');
}

function endRound() {
    if (STATE.holes.length === 0 && !STATE.currentHoleData.fairway) {
        showScreen('setupScreen'); return;
    }
    // Save partial
    if (STATE.currentHoleData.putts > 0 || STATE.currentHoleData.fairway !== null) {
        STATE.holes.push({...STATE.currentHoleData});
    }
    finishRound();
}

function computeRoundStats(holes) {
    const total = holes.length;
    if (total === 0) return {};
    const fw = holes.filter(h => h.fairway === true).length;
    const fwEligible = holes.filter(h => h.fairway !== null).length;
    const gir = holes.filter(h => h.green === true).length;
    const totalPutts = holes.reduce((s,h) => s + h.putts, 0);
    const upDownAttempts = holes.filter(h => h.upDown !== null);
    const upDownMade = upDownAttempts.filter(h => h.upDown === true).length;
    const bunkerAttempts = holes.filter(h => h.missLocation === 'bunker' && h.upDown !== null);
    const bunkerMade = bunkerAttempts.filter(h => h.upDown === true).length;
    const fringeAttempts = holes.filter(h => h.missLocation === 'fringe' && h.upDown !== null);
    const fringeMade = fringeAttempts.filter(h => h.upDown === true).length;
    
    return {
        holes: total,
        fairways: fw, fairwayTotal: fwEligible,
        gir: gir, girTotal: total,
        putts: totalPutts,
        puttsPerHole: (totalPutts / total).toFixed(1),
        upDown: upDownMade, upDownTotal: upDownAttempts.length,
        bunkerSaves: bunkerMade, bunkerTotal: bunkerAttempts.length,
        fringeSaves: fringeMade, fringeTotal: fringeAttempts.length,
        missLeft: holes.filter(h => h.fairwayMiss === 'left').length,
        missRight: holes.filter(h => h.fairwayMiss === 'right').length,
    };
}

// ==========================================
// STATS / SCORECARD / HISTORY
// ==========================================
function showStats() {
    const s = computeRoundStats([...STATE.holes, ...(STATE.currentHoleData.fairway !== null ? [STATE.currentHoleData] : [])]);
    const body = document.getElementById('statsBody');
    
    const pct = (n, d) => d > 0 ? Math.round(n/d*100) + '%' : '—';
    
    body.innerHTML = `
        <div class="stat-card">
            <div class="stat-card-title">Putts</div>
            <div class="stat-card-value">${s.putts || 0}</div>
            <div class="stat-card-sub">${s.puttsPerHole || '0'} per hole</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-title">Fairways</div>
            <div class="stat-row-inline"><span class="stat-row-label">Hit</span><span class="stat-row-value">${pct(s.fairways, s.fairwayTotal)} (${s.fairways||0}/${s.fairwayTotal||0})</span></div>
            <div class="stat-row-inline"><span class="stat-row-label">Miss Left</span><span class="stat-row-value">${s.missLeft||0}</span></div>
            <div class="stat-row-inline"><span class="stat-row-label">Miss Right</span><span class="stat-row-value">${s.missRight||0}</span></div>
        </div>
        <div class="stat-card">
            <div class="stat-card-title">Greens in Regulation</div>
            <div class="stat-card-value">${pct(s.gir, s.girTotal)}</div>
            <div class="stat-card-sub">${s.gir||0} of ${s.girTotal||0}</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-title">Scrambling</div>
            <div class="stat-row-inline"><span class="stat-row-label">Up & Down</span><span class="stat-row-value">${pct(s.upDown, s.upDownTotal)} (${s.upDown||0}/${s.upDownTotal||0})</span></div>
            <div class="stat-row-inline"><span class="stat-row-label">Sand Saves</span><span class="stat-row-value">${pct(s.bunkerSaves, s.bunkerTotal)} (${s.bunkerSaves||0}/${s.bunkerTotal||0})</span></div>
            <div class="stat-row-inline"><span class="stat-row-label">From Fringe</span><span class="stat-row-value">${pct(s.fringeSaves, s.fringeTotal)} (${s.fringeSaves||0}/${s.fringeTotal||0})</span></div>
        </div>`;
    
    document.getElementById('statsOverlay').classList.add('active');
}

function showScorecard() {
    const body = document.getElementById('scorecardBody');
    const allHoles = [...STATE.holes];
    if (STATE.currentHoleData) allHoles.push(STATE.currentHoleData);
    
    let html = '<div class="stat-card"><div class="stat-card-title">Scorecard</div>';
    // Front 9
    html += '<div class="scorecard">';
    for (let i = 1; i <= 9; i++) html += `<div class="sc-cell sc-header">${i}</div>`;
    for (let i = 1; i <= 9; i++) {
        const h = allHoles.find(h => h.number === i);
        const cls = h ? (i === STATE.currentHole ? ' current' : '') : '';
        html += `<div class="sc-cell sc-score${cls}">${h ? h.putts : '·'}</div>`;
    }
    html += '</div>';
    // Back 9
    html += '<div class="scorecard" style="margin-top:8px">';
    for (let i = 10; i <= 18; i++) html += `<div class="sc-cell sc-header">${i}</div>`;
    for (let i = 10; i <= 18; i++) {
        const h = allHoles.find(h => h.number === i);
        const cls = h ? (i === STATE.currentHole ? ' current' : '') : '';
        html += `<div class="sc-cell sc-score${cls}">${h ? h.putts : '·'}</div>`;
    }
    html += '</div></div>';
    
    body.innerHTML = html;
    document.getElementById('scorecardOverlay').classList.add('active');
}

function showHistory() {
    const body = document.getElementById('historyBody');
    
    if (DB.rounds.length === 0) {
        body.innerHTML = '<div class="empty-state"><div class="icon">📜</div><div>No rounds yet</div></div>';
    } else {
        body.innerHTML = DB.rounds.slice().reverse().map((r, i) => {
            const s = r.stats || {};
            const date = new Date(r.date).toLocaleDateString();
            return `<div class="history-card">
                <div class="history-card-left">
                    <div class="history-course">${r.course || 'Unknown'}</div>
                    <div class="history-date">${date} · ${s.holes||0} holes</div>
                </div>
                <div class="history-card-right">
                    <div class="history-score">${s.putts||0} putts</div>
                    <div class="history-stats">FW ${s.fairways||0}/${s.fairwayTotal||0} · GIR ${s.gir||0}/${s.girTotal||0}</div>
                </div>
            </div>`;
        }).join('');
    }
    
    document.getElementById('historyOverlay').classList.add('active');
}

initSetup();
initPuttScreen();
checkReadReady();
</script>
